<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>StreamCS 얼굴 인식 오버레이</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1920px; height: 1080px;
  background: transparent;
  overflow: hidden;
  font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
}

/* 웹캠 미러 (OBS 크로마키용, 필요 시 display:none) */
#video-container {
  position: absolute;
  bottom: 20px; right: 20px;
  width: 360px; height: 270px;
  border-radius: 16px;
  overflow: hidden;
  border: 3px solid rgba(255,214,0,0.6);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
#video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#face-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
}

/* 게임 캔버스 */
#game-canvas {
  position: absolute; inset: 0;
  width: 1920px; height: 1080px;
}

/* HUD */
.hud {
  position: absolute;
  top: 30px; left: 40px;
  display: flex; gap: 16px; align-items: center;
}
.hud-score {
  padding: 10px 24px;
  background: rgba(0,0,0,0.85);
  border: 2px solid #FFD600;
  border-radius: 50px;
  font-size: 28px; font-weight: 900;
  color: #FFD600;
}
.hud-timer {
  padding: 10px 24px;
  background: rgba(0,0,0,0.85);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50px;
  font-size: 28px; font-weight: 700;
  color: #fff;
  font-variant-numeric: tabular-nums;
}
.hud-timer.warning { border-color: #FF5252; color: #FF5252; animation: pulse 1s infinite; }

/* 입 상태 인디케이터 */
#mouth-indicator {
  position: absolute;
  bottom: 310px; right: 30px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  border: 3px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  transition: all .15s;
}
#mouth-indicator.open {
  border-color: #69F0AE;
  background: rgba(105,240,174,0.2);
  transform: scale(1.2);
}

/* 콤보 */
#combo-display {
  position: absolute;
  top: 50%; right: 60px;
  transform: translateY(-50%);
  text-align: center;
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
#combo-display.show { opacity: 1; }
.combo-num { font-size: 90px; font-weight: 900; color: #FF6B9D;
  text-shadow: 0 0 30px rgba(255,107,157,0.6); line-height: 1; }
.combo-label { font-size: 26px; color: rgba(255,255,255,0.7); }

/* 음식 아이템 레이어 */
#food-layer {
  position: absolute; inset: 0;
  pointer-events: none;
}
.food-item {
  position: absolute;
  font-size: 48px;
  line-height: 1;
  transition: none;
  user-select: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}
.food-item.eaten {
  animation: eatPop .4s forwards;
}

/* 면 게임 전용 */
#noodle-display {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}
.noodle-count {
  font-size: 140px; font-weight: 900;
  color: #FFD600;
  text-shadow: 0 0 60px rgba(255,214,0,0.6), 0 4px 20px rgba(0,0,0,0.8);
  line-height: 1;
}
.noodle-speed {
  font-size: 32px; font-weight: 600;
  color: rgba(255,255,255,0.7);
  margin-top: 12px;
}

/* 알림 */
.float-text {
  position: absolute;
  font-size: 36px; font-weight: 900;
  color: #FFD600;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  pointer-events: none;
  animation: floatUp 1.2s forwards;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes eatPop {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.8; }
  100% { transform: scale(0.2); opacity: 0; }
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-80px); }
}
</style>
<!-- MediaPipe FaceMesh CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- 웹캠 미리보기 -->
<div id="video-container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="face-canvas"></canvas>
</div>

<!-- 게임 HUD -->
<div class="hud">
  <div class="hud-score" id="score-display">0점</div>
  <div class="hud-timer" id="timer-display">--:--</div>
</div>

<!-- 입 상태 인디케이터 -->
<div id="mouth-indicator">😐</div>

<!-- 콤보 -->
<div id="combo-display">
  <div class="combo-num" id="combo-num">0</div>
  <div class="combo-label">COMBO!</div>
</div>

<!-- 음식 아이템 레이어 (음식 먹기 게임) -->
<div id="food-layer"></div>

<!-- 면 게임 디스플레이 -->
<div id="noodle-display" style="display:none">
  <div class="noodle-count" id="chew-count">0</div>
  <div class="noodle-speed" id="chew-speed">속도: 0회/분</div>
</div>

<script>
// ════════════════════════════════════════════════════
// 설정
// ════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const OVERLAY_KEY = params.get('key') || 'demo-key';
const WS_URL = params.get('server') || 'ws://localhost:3001';
const GAME_ID = params.get('game') || 'food'; // 'food' | 'noodle'

// ════════════════════════════════════════════════════
// 게임 상태
// ════════════════════════════════════════════════════
const GameState = {
  active: false,
  score: 0,
  combo: 0,
  timer: 0,
  chewCount: 0,
  chewSpeed: 0,
  chewStartTime: null,
  mouthOpen: false,
  mouthOpenRatio: 0,
  foods: [], // 음식 아이템 목록
  nextFoodId: 0,
};

// 얼굴 랜드마크 인덱스 (MediaPipe FaceMesh)
const LIPS = {
  UPPER_INNER: [13, 14],
  LOWER_INNER: [14, 17],
  UPPER: 13,   // 위 입술 내측
  LOWER: 14,   // 아래 입술 내측
};

const MOUTH_OPEN_THRESHOLD = 0.04;   // 입 열림 기준 (얼굴 높이 대비)
const MOUTH_CLOSE_THRESHOLD = 0.025; // 입 닫힘 기준

// ════════════════════════════════════════════════════
// WebSocket
// ════════════════════════════════════════════════════
let ws = null;

function connectWS() {
  ws = new WebSocket(`${WS_URL}?key=${OVERLAY_KEY}&type=face-overlay`);
  ws.onopen = () => console.log('[Face] WS 연결됨');
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleServerMsg(msg);
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => {};
}

function sendFaceEvent(event, data = {}) {
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'FACE_EVENT', payload: { event, data } }));
  }
}

function handleServerMsg(msg) {
  if (msg.type === 'GAME_START' && (msg.payload.gameId === 'food' || msg.payload.gameId === 'noodle')) {
    startGame(msg.payload);
  }
  if (msg.type === 'GAME_STOP') stopGame();
  if (msg.type === 'TIMER_UPDATE') updateTimer(msg.payload.timer);
  if (msg.type === 'INIT' || msg.type === 'STATE_UPDATE') {
    if (msg.state?.active) startGame({ gameId: msg.state.gameId, ...msg.state.settings });
  }
  // 점수 업데이트
  if (msg.type === 'GAME_EVENT') {
    if (msg.payload.event === 'FOOD_EAT') {
      updateScore(msg.payload.score, msg.payload.combo);
    }
    if (msg.payload.event === 'NOODLE_CHEW') {
      updateChew(msg.payload.chewCount, msg.payload.speed);
    }
  }
}

// ════════════════════════════════════════════════════
// 게임 제어
// ════════════════════════════════════════════════════
function startGame(payload) {
  GameState.active = true;
  GameState.score = 0;
  GameState.combo = 0;
  GameState.chewCount = 0;
  GameState.chewStartTime = null;
  GameState.foods = [];
  GameState.mouthOpen = false;

  if (GAME_ID === 'food' || payload.gameId === 'food') {
    document.getElementById('food-layer').innerHTML = '';
    document.getElementById('noodle-display').style.display = 'none';
    startFoodSpawner();
  } else {
    document.getElementById('noodle-display').style.display = 'block';
  }

  updateScore(0, 0);
}

function stopGame() {
  GameState.active = false;
  clearInterval(GameState._spawnInterval);
}

function updateTimer(t) {
  const el = document.getElementById('timer-display');
  const mm = Math.floor(t / 60).toString().padStart(2, '0');
  const ss = (t % 60).toString().padStart(2, '0');
  el.textContent = `${mm}:${ss}`;
  el.classList.toggle('warning', t <= 10);
  GameState.timer = t;
}

function updateScore(score, combo) {
  GameState.score = score;
  GameState.combo = combo;
  document.getElementById('score-display').textContent = `${score}점`;
  const comboEl = document.getElementById('combo-display');
  document.getElementById('combo-num').textContent = combo;
  comboEl.classList.toggle('show', combo >= 3);
}

function updateChew(count, speed) {
  document.getElementById('chew-count').textContent = count;
  document.getElementById('chew-speed').textContent = `속도: ${speed}회/분`;
}

// ════════════════════════════════════════════════════
// 음식 스포너
// ════════════════════════════════════════════════════
const FOOD_ITEMS = ['🍎','🍊','🍋','🍇','🍓','🍔','🍕','🌮','🍜','🍣','🧁','🍩'];

function startFoodSpawner() {
  clearInterval(GameState._spawnInterval);
  GameState._spawnInterval = setInterval(() => {
    if (!GameState.active) return;
    spawnFood();
  }, 1200);
  // 처음엔 즉시 3개 스폰
  for (let i = 0; i < 3; i++) spawnFood();
}

function spawnFood() {
  const layer = document.getElementById('food-layer');
  const emoji = FOOD_ITEMS[Math.floor(Math.random() * FOOD_ITEMS.length)];
  const id = `food-${GameState.nextFoodId++}`;
  const x = 100 + Math.random() * 1600;
  const y = -60;
  const speed = 2 + Math.random() * 3;
  const score = Math.floor(Math.random() * 3) + 1; // 1~3점

  const el = document.createElement('div');
  el.className = 'food-item';
  el.id = id;
  el.textContent = emoji;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.dataset.x = x;
  el.dataset.y = y;
  el.dataset.speed = speed;
  el.dataset.score = score;
  layer.appendChild(el);

  GameState.foods.push({ id, x, y, speed, score, emoji, el, eaten: false });
}

// 음식 낙하 애니메이션
function updateFoods() {
  GameState.foods = GameState.foods.filter(f => {
    if (f.eaten) return false;
    f.y += f.speed;
    f.el.style.top = f.y + 'px';
    // 화면 밖으로 나가면 제거 + MISS 이벤트
    if (f.y > 1120) {
      f.el.remove();
      if (GameState.active) {
        sendFaceEvent('MISS', { foodId: f.id });
      }
      return false;
    }
    return true;
  });
  requestAnimationFrame(updateFoods);
}
requestAnimationFrame(updateFoods);

// ════════════════════════════════════════════════════
// MediaPipe 얼굴 인식
// ════════════════════════════════════════════════════
const video = document.getElementById('video');
const faceCanvas = document.getElementById('face-canvas');
const faceCtx = faceCanvas.getContext('2d');

// 얼굴 중심 (입 위치) 추적
let faceCenter = { x: 960, y: 400 };
let faceHeight = 200;

const faceMesh = new FaceMesh({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.6,
});

faceMesh.onResults((results) => {
  faceCanvas.width = video.videoWidth;
  faceCanvas.height = video.videoHeight;
  faceCtx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);

  if (!results.multiFaceLandmarks?.length) return;

  const landmarks = results.multiFaceLandmarks[0];
  const W = faceCanvas.width;
  const H = faceCanvas.height;

  // 입 랜드마크 (FaceMesh 기준)
  // 입 위쪽 내측: 13, 아래쪽 내측: 14
  // 입꼬리: 61(왼쪽), 291(오른쪽)
  const upper = landmarks[13];
  const lower = landmarks[14];
  const leftCorner = landmarks[61];
  const rightCorner = landmarks[291];

  // 이마~턱 높이 (랜드마크 10: 이마, 152: 턱)
  const forehead = landmarks[10];
  const chin = landmarks[152];
  faceHeight = Math.abs(chin.y - forehead.y);

  // 입 열림 비율 (얼굴 높이 대비)
  const mouthGap = Math.abs(lower.y - upper.y);
  GameState.mouthOpenRatio = mouthGap / faceHeight;

  // 입 중심 (1920x1080 기준으로 변환)
  const mouthCenterX = ((leftCorner.x + rightCorner.x) / 2) * 1920;
  const mouthCenterY = ((upper.y + lower.y) / 2) * 1080;
  faceCenter = { x: mouthCenterX, y: mouthCenterY };

  // 입 열림/닫힘 감지
  detectMouthState(GameState.mouthOpenRatio, mouthCenterX, mouthCenterY);

  // 디버그: 입 랜드마크 시각화
  if (params.get('debug') === '1') {
    drawLandmarks(faceCtx, landmarks, W, H);
    faceCtx.fillStyle = GameState.mouthOpen ? 'rgba(105,240,174,0.5)' : 'rgba(255,255,255,0.2)';
    faceCtx.beginPath();
    faceCtx.arc(upper.x * W, upper.y * H, 4, 0, Math.PI * 2);
    faceCtx.arc(lower.x * W, lower.y * H, 4, 0, Math.PI * 2);
    faceCtx.fill();
  }
});

function detectMouthState(ratio, mx, my) {
  const wasOpen = GameState.mouthOpen;
  const isOpen = ratio > MOUTH_OPEN_THRESHOLD;
  const isClosed = ratio < MOUTH_CLOSE_THRESHOLD;

  // 입 열림
  if (!wasOpen && isOpen) {
    GameState.mouthOpen = true;
    document.getElementById('mouth-indicator').classList.add('open');
    document.getElementById('mouth-indicator').textContent = '😮';
  }
  // 입 닫힘 (열렸다가 닫힐 때 이벤트 발생)
  else if (wasOpen && isClosed) {
    GameState.mouthOpen = false;
    document.getElementById('mouth-indicator').classList.remove('open');
    document.getElementById('mouth-indicator').textContent = '😐';

    if (!GameState.active) return;

    if (GAME_ID === 'food') {
      checkFoodEat(mx, my);
    } else if (GAME_ID === 'noodle') {
      handleChew(mx, my);
    }
  }
}

// 음식 먹기 감지 (입 닫힐 때 근처 음식 체크)
function checkFoodEat(mx, my) {
  const EAT_RADIUS = 120; // 픽셀 반경

  let eaten = null;
  let minDist = EAT_RADIUS;

  GameState.foods.forEach(f => {
    if (f.eaten) return;
    const dx = f.x - mx;
    const dy = f.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < minDist) {
      minDist = dist;
      eaten = f;
    }
  });

  if (eaten) {
    eaten.eaten = true;
    eaten.el.classList.add('eaten');
    setTimeout(() => eaten.el.remove(), 400);

    // 플로팅 텍스트
    spawnFloatText(`+${eaten.score}`, eaten.x, eaten.y);

    // 서버에 이벤트 전송
    sendFaceEvent('MOUTH_OPEN');
    sendFaceEvent('MOUTH_CLOSE', {
      foodNear: true,
      foodType: eaten.emoji,
      foodScore: eaten.score,
    });
  }
}

// 면 먹기 씹기 감지
let lastChewTime = 0;
function handleChew(mx, my) {
  const now = Date.now();
  // 최소 200ms 간격 (너무 빠른 감지 방지)
  if (now - lastChewTime < 200) return;
  lastChewTime = now;

  if (!GameState.chewStartTime) GameState.chewStartTime = now;
  GameState.chewCount++;

  const elapsed = (now - GameState.chewStartTime) / 1000;
  GameState.chewSpeed = elapsed > 0 ? Math.round(GameState.chewCount / elapsed * 60) : 0;

  sendFaceEvent('CHEW', {
    chewCount: GameState.chewCount,
    elapsed: Math.round(elapsed),
    speed: GameState.chewSpeed,
  });

  spawnFloatText('😋', mx, my - 50);
}

// 플로팅 텍스트 이펙트
function spawnFloatText(text, x, y) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// 랜드마크 시각화 (디버그용)
function drawLandmarks(ctx, landmarks, W, H) {
  ctx.fillStyle = 'rgba(255,214,0,0.6)';
  landmarks.forEach(lm => {
    ctx.beginPath();
    ctx.arc(lm.x * W, lm.y * H, 1.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ════════════════════════════════════════════════════
// 카메라 시작
// ════════════════════════════════════════════════════
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: 'user' }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      const camera = new Camera(video, {
        onFrame: async () => {
          await faceMesh.send({ image: video });
        },
        width: 1280,
        height: 720,
      });
      camera.start();
    };
  } catch (err) {
    console.error('[Face] 카메라 접근 실패:', err);
    document.getElementById('mouth-indicator').textContent = '❌';
  }
}

// ════════════════════════════════════════════════════
// 시작
// ════════════════════════════════════════════════════
connectWS();
startCamera();
</script>
</body>
</html>
